name: Sentiment Tracker

on:
  schedule:
    # 3x daily PT: 8am (16:00 UTC), 2pm (22:00 UTC), 8pm (04:00 UTC next day)
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
    - cron: '0 4  * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Score Sentiment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            requests \
            supabase \
            google-genai \
            vaderSentiment \
            python-dotenv \
            json5

      - name: Run sentiment scraper
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:     "clawbeat-sentiment/1.0 by u/clawbeat"
          BLUESKY_HANDLE:        "clawbeat.bsky.social"
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_SENTIMENT_APP_PASSWORD }}
          YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: python scrape_sentiment.py
